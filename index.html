<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6a11cb,#2575fc);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#00d4ff55;
border-radius:50%;
filter:blur(100px);
top:-100px;
left:-100px;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:250px;
height:250px;
background:#ff00c855;
border-radius:50%;
filter:blur(100px);
bottom:-100px;
right:-100px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
to{
transform:translate(150px,150px);
}
}

@keyframes move2{
to{
transform:translate(-150px,-120px);
}
}

.card{

position:relative;
z-index:2;

width:90%;
max-width:420px;

padding:40px;

border-radius:25px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

box-shadow:0 20px 60px rgba(0,0,0,.4);

text-align:center;

color:white;

}

.avatar{

width:130px;
height:130px;

margin:auto;

border-radius:50%;

background:linear-gradient(45deg,#00d4ff,#6a11cb);

display:flex;

justify-content:center;
align-items:center;

font-size:60px;

box-shadow:0 0 35px #00d4ff;

animation:float 3s ease-in-out infinite;

}

@keyframes float{

50%{
transform:translateY(-10px);
}

}

h1{

margin-top:20px;
font-size:32px;

}

p{

margin:10px 0 30px;
color:#ddd;

}

.link{

display:flex;
align-items:center;
justify-content:center;
gap:12px;

padding:16px;

margin:15px 0;

border-radius:15px;

text-decoration:none;

color:white;

font-weight:600;

font-size:18px;

background:rgba(255,255,255,.12);

transition:.35s;

}

.link:hover{

background:white;

color:#111;

transform:translateY(-5px) scale(1.03);

box-shadow:0 0 25px white;

}

.link i{

font-size:22px;

}

footer{

margin-top:25px;

font-size:13px;

color:#ccc;

}

</style>

</head>

<body>

<div class="card">

<div class="avatar">❤️</div>

<h1>Roli❤️</h1>

<p>Pentru prieteni cu haz 😎</p>

</body>
